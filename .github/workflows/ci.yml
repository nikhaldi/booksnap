name: CI
on:
  push:
    branches: [main, lab-base, lab-android, lab-ios]
  pull_request:
  release:
    types: [published]

jobs:
  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm test

  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - uses: actions/cache@v5
        with:
          path: android/scripts/.ktlint-*
          key: ktlint-${{ hashFiles('android/scripts/ktlint.sh') }}
      - uses: actions/cache@v5
        with:
          path: |
            android/src/main/assets/hunspell
            android/test-harness/app/src/main/assets/hunspell
          key: hunspell-${{ hashFiles('android/hunspell-download.gradle') }}
      - run: pnpm run setup
      - run: pnpm run lint:android
      - run: pnpm run test:android

  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ios/scripts/.swiftlint-*
          key: swiftlint-${{ hashFiles('ios/scripts/swiftlint.sh') }}
      - run: bash ios/scripts/swiftlint.sh lint --strict
      - run: bash ios/test-harness/scripts/run-tests.sh

  ci:
    runs-on: ubuntu-latest
    needs: [test-ts, test-android, test-ios]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test-ts.result }}" != "success" ] || \
             [ "${{ needs.test-android.result }}" != "success" ] || \
             [ "${{ needs.test-ios.result }}" != "success" ]; then
            exit 1
          fi

  publish:
    needs: [ci]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - run: pnpm run publish:check
      - run: pnpm run test:integration
      - run: npm publish --provenance --access public
