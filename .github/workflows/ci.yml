name: CI
on:
  push:
    branches: [main, lab-base, lab-android, lab-ios]
  pull_request:

jobs:
  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run format:check
      - run: pnpm test

  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: android/test-harness/app/src/main/assets/hunspell-all
          key: hunspell-${{ hashFiles('android/test-harness/scripts/download-dictionaries.sh') }}
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - uses: actions/cache@v4
        with:
          path: android/scripts/.ktlint-*
          key: ktlint-${{ hashFiles('android/scripts/ktlint.sh') }}
      - run: pnpm run setup
      - run: pnpm run lint:android
      - run: pnpm run test:android

  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ios/scripts/.swiftlint-*
          key: swiftlint-${{ hashFiles('ios/scripts/swiftlint.sh') }}
      - run: bash ios/scripts/swiftlint.sh lint --strict
      - run: bash ios/test-harness/scripts/run-tests.sh

  ci:
    runs-on: ubuntu-latest
    needs: [test-ts, test-android, test-ios]
    if: always()
    steps:
      - run: |
          if [ "${{ needs.test-ts.result }}" != "success" ] || \
             [ "${{ needs.test-android.result }}" != "success" ] || \
             [ "${{ needs.test-ios.result }}" != "success" ]; then
            exit 1
          fi
