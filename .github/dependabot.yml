version: 2
updates:
  # npm (root package.json / pnpm-lock.yaml)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Gradle - main library
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"

  # Gradle - test harness
  - package-ecosystem: "gradle"
    directory: "/android/test-harness"
    schedule:
      interval: "weekly"

  # pip - shared Python utilities
  - package-ecosystem: "pip"
    directory: "/shared/python"
    schedule:
      interval: "weekly"

  # pip - Android lab
  - package-ecosystem: "pip"
    directory: "/android/lab"
    schedule:
      interval: "weekly"

  # pip - iOS lab
  - package-ecosystem: "pip"
    directory: "/ios/lab"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
