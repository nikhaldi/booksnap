included:
  - .
excluded:
  - lab
  - test-harness/build

identifier_name:
  allowed_symbols: _
  excluded:
    - id
    - x
    - y
    - to

nesting:
  type_level: 2

# The pipeline code is generated by a research agent and can grow large.
# Relax structural limits to avoid constant churn.
file_length:
  warning: 800
  error: 1000

type_body_length:
  warning: 600
  error: 800

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 25
  error: 35

large_tuple: 4

disabled_rules:
  - for_where

# Swift convention uses trailing commas in multiline collections
trailing_comma:
  mandatory_comma: true
