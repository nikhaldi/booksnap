included:
  - .
excluded:
  - lab
  - test-harness/build

identifier_name:
  allowed_symbols: _
  excluded:
    - id
    - x
    - y

nesting:
  type_level: 2

# The pipeline code is generated by a research agent and can grow large.
# Relax structural limits to avoid constant churn.
file_length:
  warning: 600
  error: 800

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 20

large_tuple: 4

disabled_rules:
  - for_where

# Swift convention uses trailing commas in multiline collections
trailing_comma:
  mandatory_comma: true
